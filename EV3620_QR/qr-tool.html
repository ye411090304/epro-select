<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>二维码生成工具</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f5f7fb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: #fff;
      border: 1px solid #dbe2ef;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 14px 36px rgba(23, 32, 51, 0.08);
    }

    h1 {
      margin: 0 0 18px;
      font-size: 22px;
      line-height: 1.25;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid #c7d0df;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 15px;
    }

    button,
    a.button {
      min-height: 44px;
      border: 0;
      border-radius: 6px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #1769e0;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .preview {
      margin-top: 24px;
      display: grid;
      gap: 14px;
      justify-items: center;
      padding: 18px;
      border: 1px dashed #c7d0df;
      border-radius: 8px;
      background: #fbfcff;
    }

    img {
      width: 280px;
      height: 280px;
      image-rendering: pixelated;
      background: #fff;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .hint,
    .error {
      margin: 14px 0 0;
      color: #596579;
      font-size: 13px;
      line-height: 1.6;
    }

    .error {
      display: none;
      color: #b42318;
      font-weight: 600;
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      main {
        padding: 18px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      img {
        width: min(280px, 100%);
        height: auto;
        aspect-ratio: 1;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>二维码生成工具</h1>

    <label for="targetUrl">输入要生成二维码的链接</label>
    <div class="row">
      <input id="targetUrl" type="url" autocomplete="url" placeholder="https://example.com/ev3620-user-guide.html">
      <button id="makeQr" type="button">生成二维码</button>
    </div>
    <p id="errorText" class="error"></p>

    <div class="preview">
      <img id="qrImage" alt="二维码预览">
      <div class="actions">
        <a id="downloadQr" class="button" href="#" download="qrcode.png">下载 PNG</a>
        <button id="copyLink" type="button">复制二维码图片地址</button>
      </div>
    </div>

    <p class="hint">
      二维码内容必须是 http 或 https 开头的网页地址。不能使用 file:/// 开头的本机文件路径，手机扫码访问不到电脑本地文件。
    </p>
  </main>

  <script>
    const input = document.querySelector("#targetUrl");
    const image = document.querySelector("#qrImage");
    const download = document.querySelector("#downloadQr");
    const makeQr = document.querySelector("#makeQr");
    const copyLink = document.querySelector("#copyLink");
    const errorText = document.querySelector("#errorText");

    function defaultTarget() {
      const params = new URLSearchParams(window.location.search);
      const target = params.get("target");
      if (target) {
        return target;
      }
      if (window.location.protocol === "file:") {
        return "";
      }
      const page = new URL("ev3620-user-guide.html", window.location.href);
      return page.href;
    }

    function buildQrUrl(value) {
      const data = encodeURIComponent(value.trim());
      return `https://api.qrserver.com/v1/create-qr-code/?size=720x720&margin=24&format=png&data=${data}`;
    }

    function refreshQr() {
      const value = input.value.trim() || defaultTarget();
      if (!/^https?:\/\//i.test(value)) {
        errorText.textContent = "请先把 HTML 上传到服务器，或用本地网页服务打开本工具，然后输入 http/https 开头的地址。";
        errorText.style.display = "block";
        image.removeAttribute("src");
        download.removeAttribute("href");
        return;
      }
      errorText.style.display = "none";
      input.value = value;
      const qrUrl = buildQrUrl(value);
      image.src = qrUrl;
      download.href = qrUrl;
    }

    makeQr.addEventListener("click", refreshQr);
    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        refreshQr();
      }
    });
    copyLink.addEventListener("click", async () => {
      await navigator.clipboard.writeText(image.src);
      copyLink.textContent = "已复制";
      setTimeout(() => {
        copyLink.textContent = "复制二维码图片地址";
      }, 1200);
    });

    refreshQr();
  </script>
</body>
</html>
